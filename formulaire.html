<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Inscription</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>


<body class="bg-dark text-light">


<div class="container py-5" style="max-width:600px">


<h1 class="h3 mb-3">Réserver votre place</h1>


<p class="text-secondary">Complétez ce formulaire pour accéder à la formation.</p>


<form action="merci.html">


<div class="mb-3">
<label class="form-label">Nom</label>
<input class="form-control" type="text" required>
</div>


<div class="mb-3">
<label class="form-label">Email</label>
<input class="form-control" type="email" required>
</div>


<div class="mb-3">
<label class="form-label">Votre objectif</label>
<select class="form-select">
<option>Créer du contenu avec l'IA</option>
<option>Optimiser mes campagnes marketing</option>
<option>Comprendre le cloud et les landing pages</option>
</select>
</div>


<button class="btn btn-primary btn-lg w-100" type="submit">
Je confirme mon inscription
</button>


<a class="btn btn-outline-light w-100 mt-2" href="index.html">Retour</a>


</form>


</div>


</body>
</html>
